[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["cd web && npm ci"]

[phases.build]
cmds = ["cd web && npm run build"]

[variables]
NEXT_TELEMETRY_DISABLED = "1"
NEXT_PUBLIC_SUPABASE_URL = "https://placeholder.supabase.co"
NEXT_PUBLIC_SUPABASE_ANON_KEY = "placeholder-key"

[start]
cmd = "cd web && npm start"
