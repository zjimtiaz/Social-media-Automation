version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  python-service:
    build:
      context: ./services/python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./services/python/.env
    depends_on:
      - redis
    volumes:
      - ./services/python:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./services/python
      dockerfile: Dockerfile
    env_file:
      - ./services/python/.env
    depends_on:
      - redis
    volumes:
      - ./services/python:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  celery-beat:
    build:
      context: ./services/python
      dockerfile: Dockerfile
    env_file:
      - ./services/python/.env
    depends_on:
      - redis
    volumes:
      - ./services/python:/app
    command: celery -A app.tasks.celery_app beat --loglevel=info

volumes:
  redis_data:
